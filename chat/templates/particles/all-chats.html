{% for chat in all_chats %}
    <div class="example-chat">
        <img src="{{url_for('chat.static', filename = 'images/avatar.png')}}" alt="">
        <div class="all-exam">
            <div class="name-hact">
                <h3 class="name">{{chat.name_chat}}</h3>
                <p>15m ago</p>
            </div>
            <div>
                <p>{{chat.last_msg}}</p> 
            </div>
        </div>
    </div>
{% endfor %}
