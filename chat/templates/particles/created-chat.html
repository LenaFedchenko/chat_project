<div class="your-chat">
    <div class="header-your-chat">
        <p>Ваш чат</p>
        <img src="{{url_for('chat.static', filename = 'images/bin.png')}}" alt="" class="del" style="cursor: pointer;">
    </div>
    <div class="example-chat" data-id="{{ created_chat.id }}">
        <div class="avatar">{{created_chat.img_chat}}</div>
        <div class="all-exam">
            <div class="name-hact">
                <p class="name">{{ created_chat.name_chat }}</p>
                <p>15m ago</p>
            </div>
            <div>
                <p>{{ created_chat.last_msg }}</p> 
            </div>
        </div>
    </div>
</div>
